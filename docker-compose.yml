version: '3.8'

services:
  # MT5 Router Backend (SaaS-ready)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mt5-router-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - MT5_IMAGE=${MT5_IMAGE:-lprett/mt5linux:mt5-installed}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/mt5router.db}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-fernet-key-change-this}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT:-100}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    networks:
      - mt5-network

  # PostgreSQL (optional - for production SaaS)
  postgres:
    image: postgres:15-alpine
    container_name: mt5-router-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mt5router
      - POSTGRES_USER=${DB_USER:-mt5router}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    networks:
      - mt5-network
    profiles:
      - production

  # MT5 Router Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mt5-router-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mt5-network

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: mt5-router-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - mt5-network
    profiles:
      - production

volumes:
  postgres_data:
  mt5_data:

networks:
  mt5-network:
    driver: bridge
