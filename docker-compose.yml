version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mt5-router-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - mt5-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mt5-router-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mt5-network

volumes:
  postgres_data:
  redis_data:

networks:
  mt5-network:
    driver: bridge
