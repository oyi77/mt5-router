version: '3.8'

services:
  backend:
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql://mt5router:${DB_PASSWORD:-changeme}@postgres:5432/mt5router
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: mt5-router-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mt5router
      - POSTGRES_USER=mt5router
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    networks:
      - mt5-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: mt5-router-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - mt5-network

volumes:
  postgres_data:
  redis_data:
